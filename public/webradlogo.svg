<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="24" cy="24" r="20" stroke="url(#logoGradient)" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Middle circle -->
  <circle cx="24" cy="24" r="13" stroke="url(#logoGradient)" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Inner circle -->
  <circle cx="24" cy="24" r="6" fill="url(#logoGradient)"/>
  <!-- Radar sweep line -->
  <line x1="24" y1="24" x2="24" y2="8" stroke="url(#logoGradient)" stroke-width="2" opacity="0.8"/>
  <!-- Sweep circle -->
  <circle cx="24" cy="24" r="16" stroke="url(#logoGradient)" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="50 100"/>
</svg>