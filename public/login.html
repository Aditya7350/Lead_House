<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — LeadEmpire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F6F8; --card:#FFFFFF; --border:#E2E8F0;
  --orange:#F97316; --orange2:#EA580C;
  --navy:#0F172A; --muted:#64748B; --muted2:#475569;
}
body{
  font-family:'Inter',sans-serif; color:var(--navy);
  background:var(--bg); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:24px;
  position:relative; overflow:hidden;
}
/* subtle background glow + dot grid, matching landing */
.dot-grid{position:fixed;inset:0;background-image:radial-gradient(circle,rgba(0,0,0,.05) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.glow{position:fixed;top:-10%;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse at center top,rgba(249,115,22,.10) 0%,transparent 65%);pointer-events:none}

.wrap{position:relative;z-index:2;width:100%;max-width:420px}

.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px}
.brand img{width:38px;height:38px;border-radius:10px;object-fit:contain}
.brand-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em}

.card{
  background:var(--card); border:1px solid var(--border); border-radius:18px;
  padding:36px 32px; box-shadow:0 12px 40px rgba(15,23,42,.06);
}
.title{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em}
.subtitle{font-size:14px;color:var(--muted);margin-top:6px;margin-bottom:26px}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:7px}
.field input{
  width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);
  font-size:14px;font-family:'Inter',sans-serif;color:var(--navy);background:#fff;
  transition:border-color .15s, box-shadow .15s;
}
.field input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.12)}

.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);padding:4px 8px}
.pw-toggle:hover{color:var(--orange)}

.error{
  display:none;background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;
  padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:16px;
}
.error.show{display:block}

.submit{
  width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:700;color:#fff;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  box-shadow:0 8px 24px rgba(249,115,22,.28);transition:transform .15s, box-shadow .15s;
  margin-top:6px;
}
.submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 30px rgba(249,115,22,.4)}
.submit:disabled{opacity:.65;cursor:not-allowed}

.toggle-line{text-align:center;font-size:13px;color:var(--muted);margin-top:22px}
.toggle-line button{background:none;border:none;cursor:pointer;color:var(--orange);font-weight:700;font-size:13px;font-family:'Inter',sans-serif}
.toggle-line button:hover{text-decoration:underline}

.back{display:block;text-align:center;margin-top:22px;font-size:13px;color:var(--muted);text-decoration:none}
.back:hover{color:var(--navy)}
</style>
</head>
<body>
<div class="dot-grid"></div>
<div class="glow"></div>

<div class="wrap">
  <div class="brand">
    <img src="/ai-lead-machine-logo.svg" alt="LeadEmpire">
    <span class="brand-name">LeadEmpire</span>
  </div>

  <div class="card">
    <div class="title" id="title">Welcome back</div>
    <div class="subtitle" id="subtitle">Sign in to your dashboard</div>

    <div class="error" id="error"></div>

    <div class="field" id="name-field" style="display:none">
      <label for="name">Full name</label>
      <input id="name" type="text" autocomplete="name" placeholder="Jane Doe">
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@company.com">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
        <button type="button" class="pw-toggle" id="pw-toggle">Show</button>
      </div>
    </div>

    <button class="submit" id="submit">Sign in</button>

    <div class="toggle-line">
      <span id="toggle-text">Don't have an account?</span>
      <button id="toggle-mode">Create one</button>
    </div>
  </div>

  <a class="back" href="/">← Back to home</a>
</div>

<script>
// Same-origin: login.html is served by FastAPI, so the API base is "".
const API = window.location.origin.includes('5173') ? 'http://localhost:3000' : '';

let isSignUp = false;

const els = {
  title:    document.getElementById('title'),
  subtitle: document.getElementById('subtitle'),
  error:    document.getElementById('error'),
  nameField:document.getElementById('name-field'),
  name:     document.getElementById('name'),
  email:    document.getElementById('email'),
  password: document.getElementById('password'),
  submit:   document.getElementById('submit'),
  toggleText:document.getElementById('toggle-text'),
  toggleMode:document.getElementById('toggle-mode'),
  pwToggle: document.getElementById('pw-toggle'),
};

// Allow ?signup=1 or #signup to open directly in register mode
if (location.search.includes('signup') || location.hash.includes('signup')) setMode(true);

function showError(msg){ els.error.textContent = msg; els.error.classList.add('show'); }
function clearError(){ els.error.classList.remove('show'); els.error.textContent = ''; }

function setMode(signup){
  isSignUp = signup;
  els.title.textContent    = signup ? 'Create account' : 'Welcome back';
  els.subtitle.textContent = signup ? 'Start your free trial today' : 'Sign in to your dashboard';
  els.submit.textContent   = signup ? 'Create account' : 'Sign in';
  els.nameField.style.display = signup ? 'block' : 'none';
  els.password.autocomplete = signup ? 'new-password' : 'current-password';
  els.toggleText.textContent = signup ? 'Already have an account?' : "Don't have an account?";
  els.toggleMode.textContent = signup ? 'Sign in' : 'Create one';
  clearError();
}

els.toggleMode.addEventListener('click', () => setMode(!isSignUp));

els.pwToggle.addEventListener('click', () => {
  const showing = els.password.type === 'text';
  els.password.type = showing ? 'password' : 'text';
  els.pwToggle.textContent = showing ? 'Show' : 'Hide';
});

async function handleSubmit(){
  clearError();
  const email = els.email.value.trim();
  const password = els.password.value;
  const name = els.name.value.trim();

  if (!email || !password){ showError('Enter email and password'); return; }
  if (isSignUp && !name){ showError('Enter your name'); return; }

  els.submit.disabled = true;
  const original = els.submit.textContent;
  els.submit.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

  try {
    const endpoint = isSignUp ? '/api/auth/register' : '/api/auth/login';
    const body = isSignUp ? { email, password, name } : { email, password };
    const res = await fetch(API + endpoint, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (res.ok && data.token){
      // Match what the dashboard reads on load (App.jsx).
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/app';
      return;
    }
    showError(data.detail || (isSignUp ? 'Registration failed' : 'Invalid email or password'));
  } catch (e) {
    showError('Cannot connect to server. Please try again.');
  }

  els.submit.disabled = false;
  els.submit.textContent = original;
}

els.submit.addEventListener('click', handleSubmit);
// Enter key submits from any field
['email','password','name'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
});
</script>
</body>
</html>
